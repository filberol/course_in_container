name: Слайды лекций

on:
  push:
    branches: [main]
    paths:
      - "slides/**"
      - ".github/workflows/slides.yml"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

env:
  LECTURES: |
    01 02 03 04 05 06 07 08
    09 10 11 12 13 14 15 16

jobs:
  build_site:
    name: Build Slidev website
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: slides

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: slides/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build interactive slides
        run: |
          mkdir -p $GITHUB_WORKSPACE/site

          for lecture in \
            01 02 03 04 05 06 07 08 \
            09 10 11 12 13 14 15 16
          do
            echo "Building lecture ${lecture}..."

            npx slidev build \
              "lectures/${lecture}.md" \
              --base "/course_in_container/${lecture}" \
              --out "$GITHUB_WORKSPACE/site/${lecture}"
          done

      - name: Add landing page
        run: |
          cp theme/pages/index.html $GITHUB_WORKSPACE/site/index.html

      - name: Debug - list site directory (optional)
        run: ls -laR $GITHUB_WORKSPACE/site
        if: runner.debug == '1'

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ github.workspace }}/site

  export_pdf:
    name: Export PDFs
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: slides

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: slides/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium dependencies
        run: |
          npx playwright install-deps chromium

      - name: Export PDFs
        run: |
          mkdir -p dist

          for lecture in \
            01 02 03 04 05 06 07 08 \
            09 10 11 12 13 14 15 16
          do
            echo "Exporting ${lecture}"

            npx slidev export \
              "lectures/${lecture}.md" \
              --output "dist/lecture-${lecture}.pdf" \
              --timeout 180000 \
              --wait 1500
          done

      - name: Install qpdf
        run: |
          sudo apt-get update
          sudo apt-get install -y qpdf

      - name: Merge PDFs
        run: |
          qpdf \
            --empty \
            --pages dist/*.pdf \
            -- dist/lectures.pdf

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: lecture-pdf
          path: slides/dist/lectures.pdf

  deploy_pages:
    name: Deploy GitHub Pages
    needs: build_site
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

  release:
    name: Publish Release
    needs: export_pdf
    runs-on: ubuntu-latest

    steps:
      - name: Download PDF artifact
        uses: actions/download-artifact@v4
        with:
          name: lecture-pdf
          path: dist

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest lecture slides
          files: dist/lectures.pdf
          make_latest: true
          generate_release_notes: false