name: Слайды лекций

on:
  push:
    branches: [main]
    paths:
      - "slides/**"
      - ".github/workflows/slides.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  export:
    name: Экспорт и публикация
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: slides

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: slides/package-lock.json

      - name: Установка зависимостей
        run: npm ci

      - name: Системные библиотеки для Chromium
        run: npx playwright install-deps chromium

      - name: Экспорт PDF
        run: |
          mkdir -p dist

          for lecture in \
            01 02 03 04 05 06 07 08 \
            09 10 11 12 13 14 15 16
          do
            echo "Exporting lecture ${lecture}..."

            npx slidev export "lectures/${lecture}.md" \
              --output "dist/${lecture}.pdf" \
              --timeout 180000 \
              --wait 1500
          done

      - name: Install qpdf
        run: |
          sudo apt-get update
          sudo apt-get install -y qpdf

      - name: Merge PDFs
        run: |
          qpdf --empty --pages dist/*.pdf -- dist/lectures.pdf

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest lecture slides
          files: slides/dist/lectures.pdf
          make_latest: true
          generate_release_notes: false